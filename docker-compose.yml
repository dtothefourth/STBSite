services:
 php:
 image: php:8.3-fpm
 container_name: simplephp-php
 volumes:
 - ./html:/var/www/html
 networks:
 - app-net

 nginx:
 image: nginx:alpine
 container_name: simplephp-nginx
 volumes:
 - ./html:/var/www/html
 - ./default.conf:/etc/nginx/conf.d/default.conf
 depends_on:
 - php
 networks:
 - app-net

networks:
 app-net: