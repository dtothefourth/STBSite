version: '3.8'

services:
  # PHP-FPM Application Container
  web-app:
    build: .
    volumes:
      - .:/var/www/html

  # Nginx Web Server Container
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web-app
