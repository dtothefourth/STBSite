version: '3.8'

services:
 php:
 image: php:8.3-fpm
 container_name: simplephp-php
 volumes:
 - .:/var/www/html
 networks:
 - app-net

  nginx:
    image: nginx:alpine
    container_name: simplephp-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php